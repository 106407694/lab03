<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta name="description" 
      content="CWA Help Desk Appointment Form">

<meta name="keywords" 
      content="CWA, Help Desk, Appointment, Swinburne">

<meta name="author" 
      content="Nahian Arshad">

<title>CWA Help Desk Appointment</title>
</head>
<body>

<!-- Swinburne Logo with hyperlink -->
<a href="http://www.swin.edu.au" target="_blank">
    <img src="images/logo.png" alt="Swinburne University Logo" style="height:60px;">
</a>

<h1>CWA Help Desk Appointment</h1>

<p>
    The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday.<br>
    Check Blackboard for when CWA tutors will be there.
</p>

<hr>

<form action="#" method="post">

    <!-- Student Details Box -->
    <fieldset>
        <legend><strong>Student details</strong></legend>
        
        <label for="studentId">Student ID</label>
<input type="text" 
       id="studentId" 
       name="studentId"
       minlength="7" 
       maxlength="10"
       placeholder="Enter 7-10 digits"
       pattern="\d{7,10}" 
       required>
<br><br>
       <label for="givenName">Given Name</label>
<input type="text" 
       id="givenName" 
       name="givenName" 
       placeholder="Enter your given name" 
       pattern="[A-Z\s]+" 
       required>

<label for="familyName">Family Name</label>
<input type="text" 
       id="familyName" 
       name="familyName" 
       placeholder="Enter your family name" 
       pattern="[A-Z\s]+" 
       required>
        <br><br>
    </fieldset>
    <br>

    <!-- Your Unit Box -->
    <fieldset>
        <legend><strong>Your unit</strong></legend>
        
        <input type="radio" id="unit1" name="unit" value="COS10011" required>
        <label for="unit1">COS10011</label><br>

        <input type="radio" id="unit2" name="unit" value="COS60004">
        <label for="unit2">COS60004</label><br>

        <input type="radio" id="unit3" name="unit" value="COS60007">
        <label for="unit3">COS60007</label>
        <br><br>
    <br>

    <!-- Your Tutor Box -->
        <legend><strong>Your Tutor (Please Select)</strong></legend>
        
        <label for="tutor">Select Tutor</label>
        <select id="tutor" name="tutor" required>
            <option value="">Please select a tutor</option>
            <option value="Dr. Sarah Chen">Dr. Sarah Chen</option>
            <option value="Michael Rodrigues">Michael Rodrigues</option>
            <option value="Emma Whitfield">Emma Whitfield</option>
            <option value="Prof. James Okonkwo">Prof. James Okonkwo</option>
            <option value="Linda Voss">Linda Voss</option>
            <option value="David Nguyen">David Nguyen</option>
        </select>
        <br><br>
    </fieldset>
    <br>

    <!-- Issue Box -->
    <fieldset>
        <legend><strong>Issue</strong></legend>
        
       <input type="checkbox" id="html" 
       name="issue[]" 
       value="HTML"
       checked="checked">
<label for="html">HTML</label><br>

<input type="checkbox" id="css" 
       name="issue[]" 
       value="CSS">
<label for="css">CSS</label><br>

<input type="checkbox" id="js" 
       name="issue[]" 
       value="JavaScript">
<label for="js">JavaScript</label><br>

<input type="checkbox" id="php" 
       name="issue[]" 
       value="PHP">
<label for="php">PHP</label><br>

<input type="checkbox" id="mysql" 
       name="issue[]" 
       value="MySQL">
<label for="mysql">MySQL</label>
        <br><br>
    <br>

    <!-- Description of Issue Box -->
        <legend><strong>Description of Issue</strong></legend>
        
        <textarea name="description" rows="4" cols="50" placeholder="Write description of your problem here..."></textarea>
        <br><br>
    </fieldset>
    <br>

    <!-- Preferred Date / Time Box -->
    <fieldset>
        <legend><strong>Preferred Date / Time</strong></legend>
        
        <label for="prefDate">Date</label>
        <input type="date" 
       id="prefDate" 
       name="prefDate"
       placeholder="dd/mm/yyyy"
       required>
        <br><br>

        <label for="prefTime">Time</label>
       <input type="time" 
       id="prefTime" 
       name="prefTime"
       pattern="([01]?[0-9]|2[0-3]):[0-5][0-9]"
       placeholder="hh:mm"
       required>
        <br><br>

        <!-- Chrome shows calendar & time dropdown | Firefox shows plain text with basic picker -->
    </fieldset>
    <br>

    <button type="submit">Book</button>
    <button type="reset">Reset form</button>

    <br><br>

</form>

</body>
</html>
